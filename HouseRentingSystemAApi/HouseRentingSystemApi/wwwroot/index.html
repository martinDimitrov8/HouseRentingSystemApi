<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Renting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">House Renting System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="#houses">Houses</a></li>
                    <li class="nav-item" id="addHouseNavItem"><a class="nav-link" href="#create" id="addHouseLink" onclick="openCreateSectionFromNav(event)">Add House</a></li>
                </ul>
                <div class="d-flex gap-2 align-items-center" id="guestActions">
                    <button class="btn btn-sm btn-outline-light" id="openLoginBtn">Login</button>
                    <button class="btn btn-sm btn-light" id="openRegisterBtn">Register</button>
                </div>
                <div class="d-flex gap-2 align-items-center d-none" id="userActions">
                    <span id="authState" class="badge text-bg-secondary">Guest</span>
                    <button class="btn btn-sm btn-outline-light" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero py-5">
        <div class="container text-center">
            <h1 class="display-5 fw-bold">Find your next home</h1>
            <p class="lead mb-0">Responsive UI over your current API endpoints.</p>
        </div>
    </header>

    <main class="container py-4">
        <div id="messageBox" class="alert d-none mb-4" role="alert"></div>

        <section id="houses" class="mb-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h3 mb-0">All Houses</h2>
                <button class="btn btn-outline-primary" id="refreshBtn">Refresh</button>
            </div>
            <div id="housesGrid" class="row g-4"></div>
        </section>

        <section id="create" class="d-none">
            <div class="card">
                <div class="card-body">
                    <h2 class="h4 mb-3">Add House (JWT required)</h2>
                    <div id="createAuthNote" class="alert alert-warning d-none">
                        Трябва да си логнат, за да добавяш къщи.
                    </div>
                    <form id="createHouseForm" class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" id="houseTitle" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" id="houseAddress" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Image Url</label>
                            <input type="url" class="form-control" id="houseImageUrl" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="houseDescription" rows="3" required></textarea>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Price Per Month</label>
                            <input type="number" class="form-control" id="housePrice" min="0" step="0.01" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Category</label>
                            <select id="houseCategory" class="form-select">
                                <option value="1">SingleBedroom</option>
                                <option value="2">DoubleBedroom</option>
                                <option value="3">SingleFamily</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <button class="btn btn-dark" type="submit">Create House</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">House Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="detailsBody"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="authModalTitle">Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm" class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="loginEmail" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <div class="col-12">
                            <button class="btn btn-primary w-100" type="submit">Login</button>
                        </div>
                    </form>

                    <form id="registerForm" class="row g-3 d-none">
                        <div class="col-12">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="registerUsername" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="registerEmail" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="registerPassword" required minlength="6">
                        </div>
                        <div class="col-12">
                            <button class="btn btn-success w-100" type="submit">Register</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
