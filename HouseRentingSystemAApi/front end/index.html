<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background: #f4f6fb; }
        .card { max-width: 420px; background: #fff; padding: 1rem; border-radius: 10px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
        h2 { margin-top: 0; }
        label { display: block; margin-top: .8rem; margin-bottom: .2rem; }
        input { width: 100%; padding: .6rem; box-sizing: border-box; }
        button { margin-top: 1rem; padding: .7rem 1rem; width: 100%; cursor: pointer; }
        #result { margin-top: 1rem; white-space: pre-wrap; font-size: .9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        <form id="registerForm">
            <label for="username">Username</label>
            <input id="username" type="text" value="john2" required />

            <label for="email">Email</label>
            <input id="email" type="email" value="john2@gmail.com" required />

            <label for="password">Password</label>
            <input id="password" type="password" value="123456" required />

            <button type="submit">Register</button>
        </form>
        <div id="result"></div>
    </div>

    <script src="./register.js"></script>
    <script>
        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const result = document.getElementById("result");
            result.textContent = "Sending...";

            const payload = {
                username: document.getElementById("username").value.trim(),
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value
            };

            try {
                const response = await fetch("http://localhost:5044/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                result.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                result.textContent = "Network error: " + err.message;
            }
        });
    </script>
</body>
</html>
